spring.application.name=piring-sehat-api
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# =====================================================================
# KONFIGURASI DATABASE (Supabase PostgreSQL)
# =====================================================================
# Semua nilai diambil dari Environment Variables di Railway Dashboard.
# TIDAK ADA kredensial yang ditulis langsung di file ini.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =====================================================================
# KONFIGURASI SUPABASE AUTH
# =====================================================================
supabase.url=${SUPABASE_URL}
supabase.anon-key=${SUPABASE_ANON_KEY}
supabase.jwt-secret=${SUPABASE_JWT_SECRET}

# =====================================================================
# KONFIGURASI OAUTH2 RESOURCE SERVER (JWT Validation)
# =====================================================================

# Port server (Railway secara otomatis menyediakan variabel PORT)
server.port=${PORT:8080}

# Konfigurasi Supabase JWT Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI}
spring.security.oauth2.resourceserver.jwt.jws-algorithms=ES256

# =====================================================================
# KONFIGURASI LOGGING (Production-ready)
# =====================================================================
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.com.piring.sehat=INFO
